name: Fuzz

# Coverage-guided fuzzing of every untrusted-bytes decoder (see FUZZING.md).
# Runs nightly and on demand -- not on every PR (the proptest fuzz targets in
# `cargo test` already gate PRs). A crash fails the job and uploads the repro.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      max_total_time:
        description: "Seconds to fuzz each target"
        required: false
        default: "180"

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [snapshot, resp, command, table_query, msgpack]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            fuzz -> target
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Fuzz ${{ matrix.target }}
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} -- \
            -max_total_time=${{ github.event.inputs.max_total_time || '180' }} \
            -rss_limit_mb=4096
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/
          if-no-files-found: ignore
